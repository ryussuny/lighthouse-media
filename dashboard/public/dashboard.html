<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lighthouse Media — Virtual HQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter','Segoe UI',sans-serif;background:#080810;color:#e0e0e0;overflow:hidden}
    canvas{display:block;position:fixed;top:0;left:0}

    /* === HEADER === */
    #header{
      position:fixed;top:0;left:0;right:0;height:48px;
      background:linear-gradient(180deg,rgba(8,8,16,0.97) 80%,rgba(8,8,16,0));
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;z-index:200;
      border-bottom:1px solid rgba(29,158,117,0.08);
    }
    #header-left{display:flex;align-items:center;gap:16px}
    #header h1{font-size:14px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;letter-spacing:0.5px}
    #header h1 span.logo{color:#1D9E75;font-size:16px}
    .live-dot{width:7px;height:7px;background:#1D9E75;border-radius:50%;animation:pulse 2s infinite;box-shadow:0 0 10px #1D9E75}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.3}}
    #live-badge{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;padding:2px 10px;border-radius:10px;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
    #clock{font-size:10px;color:#555;font-weight:300;font-variant-numeric:tabular-nums}

    /* Nav links */
    #nav{display:flex;align-items:center;gap:4px}
    #nav a{
      font-size:10px;color:#666;text-decoration:none;padding:5px 10px;
      border-radius:6px;transition:all .2s;font-weight:500;
    }
    #nav a:hover{color:#1D9E75;background:rgba(29,158,117,0.08)}
    #nav a.active{color:#1D9E75;background:rgba(29,158,117,0.12)}

    /* === LEFT PANEL: Agent List === */
    #agent-panel{
      position:fixed;top:56px;left:12px;width:200px;max-height:calc(100vh - 72px);
      overflow-y:auto;background:rgba(8,8,16,0.92);
      border:1px solid rgba(29,158,117,0.12);border-radius:12px;
      padding:12px;z-index:150;backdrop-filter:blur(16px);
    }
    .panel-title{font-size:9px;color:#1D9E75;text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:8px}
    .dept-label{font-size:8px;color:#555;text-transform:uppercase;letter-spacing:1.5px;margin-top:10px;margin-bottom:4px;font-weight:600;display:flex;align-items:center;gap:6px}
    .dept-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.04)}
    .agent-row{
      display:flex;align-items:center;gap:6px;padding:4px 6px;
      border-radius:6px;font-size:9px;cursor:pointer;transition:all .15s;
      color:#888;
    }
    .agent-row:hover{background:rgba(29,158,117,0.08);color:#ccc}
    .status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:all .3s}
    .status-dot.idle{background:#222;border:1px solid #333}
    .status-dot.working{background:#f1c40f;box-shadow:0 0 6px #f1c40f;animation:pulse .8s infinite}
    .status-dot.done{background:#1D9E75;box-shadow:0 0 4px #1D9E75}

    /* === RIGHT PANEL: Metrics === */
    #metrics-panel{
      position:fixed;top:56px;right:12px;width:240px;
      background:rgba(8,8,16,0.92);border:1px solid rgba(29,158,117,0.12);
      border-radius:12px;padding:14px;z-index:150;backdrop-filter:blur(16px);
    }
    .metric-row{
      display:flex;justify-content:space-between;align-items:center;
      padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);
    }
    .metric-row:last-child{border:none}
    .metric-label{color:#555;font-size:10px;font-weight:400}
    .metric-value{color:#1D9E75;font-weight:700;font-size:13px;font-variant-numeric:tabular-nums}
    .metric-value.accent{color:#BA7517}
    .metric-section{margin-top:10px;padding-top:8px;border-top:1px solid rgba(29,158,117,0.1)}
    .metric-section-title{font-size:8px;color:#1D9E75;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:6px}

    /* Channel stats */
    .channel-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:9px}
    .channel-icon{font-size:12px}
    .channel-name{color:#777;flex:1}
    .channel-val{color:#aaa;font-weight:600;font-variant-numeric:tabular-nums}

    /* === BOTTOM: Pipeline Buttons === */
    #pipeline-bar{
      position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
      background:rgba(8,8,16,0.94);border:1px solid rgba(29,158,117,0.15);
      border-radius:14px;padding:10px 18px;display:flex;gap:8px;align-items:center;z-index:150;
      backdrop-filter:blur(16px);
    }
    .pipe-label{font-size:8px;color:#444;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-right:4px}
    .pipe-btn{
      background:rgba(29,158,117,0.06);border:1px solid rgba(29,158,117,0.2);
      color:#1D9E75;padding:7px 14px;border-radius:8px;cursor:pointer;
      font-size:10px;font-weight:600;transition:all .2s;font-family:inherit;
    }
    .pipe-btn:hover{background:rgba(29,158,117,0.15);border-color:#1D9E75;transform:translateY(-1px);box-shadow:0 4px 12px rgba(29,158,117,0.15)}
    .pipe-btn:active{transform:translateY(0)}
    .pipe-btn.running{background:rgba(241,196,0,0.15);border-color:#f1c40f;color:#f1c40f;animation:pipeGlow 1s infinite alternate}
    @keyframes pipeGlow{from{box-shadow:0 0 4px rgba(241,196,0,0.2)}to{box-shadow:0 0 12px rgba(241,196,0,0.4)}}

    /* === FEED === */
    #feed{position:fixed;bottom:60px;right:12px;width:240px;max-height:200px;overflow-y:auto;z-index:150}
    .feed-item{
      background:rgba(8,8,16,0.88);border-left:2px solid #1D9E75;
      padding:5px 8px;margin-bottom:3px;border-radius:4px;font-size:8px;
      animation:feedIn .3s ease-out;backdrop-filter:blur(8px);
    }
    .feed-item.sale{border-color:#BA7517;background:rgba(186,117,23,0.06)}
    .feed-item.pipe{border-color:#3498db}
    .feed-item .feed-time{color:#333;font-variant-numeric:tabular-nums;margin-right:4px}
    @keyframes feedIn{from{opacity:0;transform:translateX(10px)}}

    /* === GOAL BAR === */
    #goal-bar{
      position:fixed;bottom:14px;right:12px;width:240px;
      background:rgba(8,8,16,0.94);border:1px solid rgba(186,117,23,0.15);
      border-radius:12px;padding:10px 14px;z-index:150;backdrop-filter:blur(16px);
    }
    .goal-header{display:flex;justify-content:space-between;align-items:center}
    .goal-label{font-size:8px;color:#555;font-weight:500}
    .goal-pct{font-size:12px;font-weight:700;color:#BA7517;font-variant-numeric:tabular-nums}
    .goal-track{width:100%;height:5px;background:rgba(255,255,255,0.04);border-radius:3px;margin-top:6px;overflow:hidden}
    .goal-fill{height:100%;background:linear-gradient(90deg,#1D9E75,#BA7517);border-radius:3px;transition:width .6s ease;box-shadow:0 0 8px rgba(29,158,117,0.3)}

    /* Scrollbar */
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(29,158,117,0.3);border-radius:2px}
  </style>
</head>

  <!-- HEADER -->

      <h1><span class="live-dot"></span><span class="logo">LIGHTHOUSE</span> MEDIA</h1>

  <!-- BOTTOM: Pipeline -->
  <div id="pipeline-bar">

  <!-- GOAL -->
  <div id="goal-bar">

  <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
  <script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RectAreaLightUniformsLib } from 'three/addons/lights/RectAreaLightUniformsLib.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

RectAreaLightUniformsLib.init();

// ============================================================
// SCENE SETUP
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060612);
scene.fog = new THREE.FogExp2(0x060612, 0.006);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 500);
camera.position.set(25, 18, 25);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.prepend(renderer.domElement);

// Post-processing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.5, 0.3, 0.8);
composer.addPass(bloom);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.03;
controls.target.set(0, 7.5, 0);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.2;
controls.maxPolarAngle = Math.PI * 0.472; // ~85 degrees
controls.minDistance = 8;
controls.maxDistance = 60;

// ============================================================
// SHARED MATERIALS (reuse everywhere)
// ============================================================
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xaaddff, transparent: true, opacity: 0.06,
  roughness: 0.05, metalness: 0.1,
  transmission: 0.92, thickness: 0.1, ior: 1.5,
  side: THREE.DoubleSide, envMapIntensity: 2,
});
const steelMat = new THREE.MeshStandardMaterial({ color: 0x888899, roughness: 0.15, metalness: 0.95 });
const brushedSteelMat = new THREE.MeshStandardMaterial({ color: 0x666677, roughness: 0.25, metalness: 0.95 });
const concreteMat = new THREE.MeshStandardMaterial({ color: 0xc0b8b0, roughness: 0.85, metalness: 0.05 });
const concreteCeilingMat = new THREE.MeshStandardMaterial({ color: 0xb8b0a8, roughness: 0.9, metalness: 0.05 });
const darkWoodMat = new THREE.MeshStandardMaterial({ color: 0x3a2820, roughness: 0.45, metalness: 0.1 });
const walnutMat = new THREE.MeshStandardMaterial({ color: 0x4a3328, roughness: 0.4, metalness: 0.05 });
const whiteMetalMat = new THREE.MeshStandardMaterial({ color: 0xe8e8ec, roughness: 0.3, metalness: 0.6 });
const chairMeshMat = new THREE.MeshStandardMaterial({ color: 0x3a3a42, roughness: 0.8, metalness: 0.1 });
const chromeMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, roughness: 0.1, metalness: 0.98 });
const navyMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.8, metalness: 0.05 });
const skinMat = new THREE.MeshStandardMaterial({ color: 0xF5D0A9, roughness: 0.7, metalness: 0.05 });
const hairDarkMat = new THREE.MeshStandardMaterial({ color: 0x1a1010, roughness: 0.9 });
const shoeMat = new THREE.MeshStandardMaterial({ color: 0x111118, roughness: 0.7, metalness: 0.2 });
const ceramicWhiteMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.3, metalness: 0.05 });
const asphaltMat = new THREE.MeshStandardMaterial({ color: 0x1a1a20, roughness: 0.95, metalness: 0.05 });
const darkBuildingMat = new THREE.MeshStandardMaterial({ color: 0x08080e, roughness: 0.9, metalness: 0.2 });
const leatherMat = new THREE.MeshStandardMaterial({ color: 0x2a1a10, roughness: 0.5, metalness: 0.15 });
const serverRackMat = new THREE.MeshStandardMaterial({ color: 0x111118, roughness: 0.3, metalness: 0.8 });

// ============================================================
// LIGHTING - Cinematic
// ============================================================
// HDRI-like hemisphere
const hemi = new THREE.HemisphereLight(0xB1E1FF, 0xB97A20, 0.3);
scene.add(hemi);

// Main sun (warm white, soft shadows)
const sunLight = new THREE.DirectionalLight(0xfff0dd, 0.6);
sunLight.position.set(30, 50, 20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(4096, 4096);
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 100;
sunLight.shadow.camera.left = -25;
sunLight.shadow.camera.right = 25;
sunLight.shadow.camera.top = 25;
sunLight.shadow.camera.bottom = -25;
sunLight.shadow.bias = -0.0002;
sunLight.shadow.normalBias = 0.02;
scene.add(sunLight);

// Blue uplight from ground on building exterior
const blueUplight1 = new THREE.SpotLight(0x2266cc, 3, 20, Math.PI / 4, 0.5);
blueUplight1.position.set(0, -0.5, 8);
blueUplight1.target.position.set(0, 10, 0);
scene.add(blueUplight1);
scene.add(blueUplight1.target);

const blueUplight2 = new THREE.SpotLight(0x2266cc, 3, 20, Math.PI / 4, 0.5);
blueUplight2.position.set(0, -0.5, -8);
blueUplight2.target.position.set(0, 10, 0);
scene.add(blueUplight2);
scene.add(blueUplight2.target);

// ============================================================
// GROUND: Dark asphalt with puddles
// ============================================================
const groundGeo = new THREE.PlaneGeometry(200, 200);
const ground = new THREE.Mesh(groundGeo, asphaltMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Reflecting puddles (randomly placed shiny circles)
const puddleMat = new THREE.MeshStandardMaterial({ color: 0x1a2040, roughness: 0.02, metalness: 0.95, transparent: true, opacity: 0.6 });
const puddleGeo = new THREE.CircleGeometry(1, 24);
for (let i = 0; i < 25; i++) {
  let px = (Math.random() - 0.5) * 80;
  let pz = (Math.random() - 0.5) * 80;
  if (Math.abs(px) < 10 && Math.abs(pz) < 8) continue;
  const puddle = new THREE.Mesh(puddleGeo, puddleMat);
  puddle.rotation.x = -Math.PI / 2;
  puddle.position.set(px, 0.01, pz);
  puddle.scale.set(0.5 + Math.random() * 1.5, 0.5 + Math.random() * 1.5, 1);
  scene.add(puddle);
}

// Sidewalk around building
const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x2a2a30, roughness: 0.8 });
const sidewalk = new THREE.Mesh(new THREE.BoxGeometry(22, 0.08, 18), sidewalkMat);
sidewalk.position.set(0, 0.04, 0);
sidewalk.receiveShadow = true;
scene.add(sidewalk);

// ============================================================
// BUILDING (5 floors, 3m each)
// ============================================================
const FH = 3.0; // floor height
const NF = 5;
const BW = 14; // building width
const BD = 10; // building depth

const floorNames = ['운영/고객/상품', '제작/마케팅', '콘텐츠', '분석/기술', '경영'];
const floorColors = [0x9b59b6, 0x3498db, 0x1D9E75, 0x1abc9c, 0xf1c40f];
const floorTints = [0x2a2228, 0x222830, 0x223028, 0x223030, 0x302a22];

// Elevator shaft (one side)
const elevShaft = new THREE.Mesh(
  new THREE.BoxGeometry(1.8, NF * FH + 0.5, 1.8),
  new THREE.MeshStandardMaterial({ color: 0x15151e, roughness: 0.4, metalness: 0.7 })
);
elevShaft.position.set(BW / 2 - 1.2, NF * FH / 2, -BD / 2 + 1.2);
elevShaft.castShadow = true;
scene.add(elevShaft);

// Elevator door markings per floor
for (let fi = 0; fi < NF; fi++) {
  const doorY = fi * FH + FH / 2 + 0.1;
  const door = new THREE.Mesh(
    new THREE.PlaneGeometry(0.8, 2.2),
    new THREE.MeshStandardMaterial({ color: 0x444455, roughness: 0.2, metalness: 0.9 })
  );
  door.position.set(BW / 2 - 1.2, doorY, -BD / 2 + 2.11);
  scene.add(door);
}

// Stairwell (other side, partially visible through glass)
const stairGroup = new THREE.Group();
for (let fi = 0; fi < NF; fi++) {
  for (let s = 0; s < 6; s++) {
    const step = new THREE.Mesh(
      new THREE.BoxGeometry(1.0, 0.12, 0.4),
      concreteMat
    );
    step.position.set(-BW / 2 + 1.0, fi * FH + s * 0.5 + 0.2, -BD / 2 + 1.0);
    stairGroup.add(step);
  }
}
scene.add(stairGroup);

for (let i = 0; i < NF; i++) {
  const y = i * FH;

  // Floor slab (polished concrete with warm tint)
  const slabMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(0xd0c8c0).lerp(new THREE.Color(floorTints[i]), 0.3),
    roughness: 0.4, metalness: 0.15
  });
  const slab = new THREE.Mesh(new THREE.BoxGeometry(BW + 0.4, 0.2, BD + 0.4), slabMat);
  slab.position.y = y;
  slab.receiveShadow = true;
  slab.castShadow = true;
  scene.add(slab);

  // Concrete ceiling (visible interior, light gray)
  if (i < NF) {
    const ceiling = new THREE.Mesh(
      new THREE.PlaneGeometry(BW - 0.2, BD - 0.2),
      concreteCeilingMat
    );
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.y = y + FH - 0.12;
    scene.add(ceiling);
  }

  // LED strip lighting along floor edges (emissive thin boxes)
  const ledColor = floorColors[i];
  const ledMat = new THREE.MeshBasicMaterial({ color: ledColor, transparent: true, opacity: 0.4 });
  // Front edge
  scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(BW, 0.02, 0.04), ledMat), { position: new THREE.Vector3(0, y + 0.11, BD / 2 - 0.3) }));
  // Back edge
  scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(BW, 0.02, 0.04), ledMat), { position: new THREE.Vector3(0, y + 0.11, -BD / 2 + 0.3) }));
  // Left edge
  scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.02, BD), ledMat), { position: new THREE.Vector3(-BW / 2 + 0.3, y + 0.11, 0) }));
  // Right edge
  scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.02, BD), ledMat), { position: new THREE.Vector3(BW / 2 - 0.3, y + 0.11, 0) }));

  // Glass curtain walls with mullions
  const wallH = FH - 0.25;
  const wallY = y + wallH / 2 + 0.12;

  // Front/back glass walls
  [BD / 2, -BD / 2].forEach(z => {
    const wall = new THREE.Mesh(new THREE.PlaneGeometry(BW, wallH), glassMat);
    wall.position.set(0, wallY, z);
    if (z < 0) wall.rotation.y = Math.PI;
    scene.add(wall);

    // Horizontal mullions (brushed steel)
    [0.33, 0.66].forEach(frac => {
      const frameLine = new THREE.Mesh(
        new THREE.BoxGeometry(BW, 0.02, 0.02),
        brushedSteelMat
      );
      frameLine.position.set(0, y + wallH * frac + 0.12, z);
      scene.add(frameLine);
    });

    // Vertical mullions between glass panels
    for (let mx = -BW / 2; mx <= BW / 2; mx += 1.75) {
      const mullion = new THREE.Mesh(new THREE.BoxGeometry(0.02, wallH, 0.02), brushedSteelMat);
      mullion.position.set(mx, wallY, z);
      scene.add(mullion);
    }
  });

  // Left/right glass walls
  [-BW / 2, BW / 2].forEach(x => {

function createErgonomicChair(x, y, z, deptColor) {
  const g = new THREE.Group();

  for (let a = 0; a < 5; a++) {

    caster.position.set(Math.cos(angle) * 0.2, -0.37, Math.sin(angle) * 0.2);
    g.add(caster);
  }

  // Gas cylinder
  const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.25, 8), chromeMat);

  // Mesh backrest (dark gray)

    new THREE.BoxGeometry(0.36, 0.45, 0.02),
    chairMeshMat
  );
  backFrame.position.set(0, 0.2, 0.2);

  // Armrests
  [-0.2, 0.2].forEach(side => {
    const armSupport = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.15, 0.02), chromeMat);

  });

  g.position.set(x, y, z);
  scene.add(g);
  return g;
}

function createHumanCharacter(x, y, z, deptColor, name, sitting) {
  const group = new THREE.Group();
  const clothMat = new THREE.MeshStandardMaterial({ color: deptColor, roughness: 0.6, metalness: 0.15 });

  // Head (sphere 0.15)
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), skinMat);
  head.position.y = sitting ? 0.72 : 0.95;
  head.castShadow = true;
  group.add(head);

  // Neck
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.035, 0.08, 8), skinMat);
  neck.position.y = sitting ? 0.58 : 0.82;
  group.add(neck);

  // Hair (dark hemisphere, varied height for variety)
  const hairHeight = 0.5 + (name.charCodeAt(0) % 3) * 0.05;
  const hair = new THREE.Mesh(
    new THREE.SphereGeometry(0.13, 16, 8, 0, Math.PI * 2, 0, Math.PI * hairHeight),
    hairDarkMat
  );
  hair.position.y = sitting ? 0.76 : 0.99;
  group.add(hair);

  // Torso (polo shirt in dept color)
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.35, 0.16), clothMat);
  torso.position.y = sitting ? 0.38 : 0.6;
  torso.castShadow = true;
  group.add(torso);

  // Arms (cylinders)
  const arms = [];
  [-0.2, 0.2].forEach((side) => {
    const upperArm = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.03, 0.2, 8), clothMat);
    const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.025, 0.18, 8), skinMat);
    if (sitting) {
      upperArm.position.set(side, 0.42, 0.02);
      upperArm.rotation.x = -0.3;
      forearm.position.set(side, 0.3, -0.05);
      forearm.rotation.x = -0.8;
    } else {
      upperArm.position.set(side, 0.55, 0);
      forearm.position.set(side, 0.38, 0);
    }
    group.add(upperArm);
    group.add(forearm);
    arms.push({ upper: upperArm, fore: forearm });
  });

  // Hands (small spheres)
  const hands = [];
  [-0.2, 0.2].forEach((side, i) => {
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.025, 6, 6), skinMat);
    if (sitting) {
      hand.position.set(side, 0.22, -0.12);
    } else {
      hand.position.set(side, 0.28, 0);
    }
    group.add(hand);
    hands.push(hand);
  });

  // Legs (navy, cylinders)
  const legs = [];
  [-0.065, 0.065].forEach((side) => {
    const upperLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.035, 0.25, 8), navyMat);
    const lowerLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.03, 0.22, 8), navyMat);
    if (sitting) {
      upperLeg.position.set(side, 0.07, -0.05);
      upperLeg.rotation.x = -Math.PI / 2 + 0.2;
      lowerLeg.position.set(side, -0.05, -0.2);
      lowerLeg.rotation.x = -0.2;
    } else {
      upperLeg.position.set(side, 0.25, 0);
      lowerLeg.position.set(side, 0.05, 0);
    }
    group.add(upperLeg);
    group.add(lowerLeg);
    legs.push({ upper: upperLeg, lower: lowerLeg });
  });

  // Shoes (dark boxes)
  const shoes = [];
  [-0.065, 0.065].forEach((side) => {
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.03, 0.09), shoeMat);
    if (sitting) {
      shoe.position.set(side, -0.15, -0.28);
    } else {
      shoe.position.set(side, -0.06, 0.01);
    }
    group.add(shoe);
    shoes.push(shoe);
  });

  // Status ring
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.25, 0.015, 8, 32),
    new THREE.MeshBasicMaterial({ color: deptColor, transparent: true, opacity: 0.25 })
  );
  ring.rotation.x = Math.PI / 2;
  ring.position.y = sitting ? -0.2 : -0.08;
  group.add(ring);

  // Name label
  const nameCanvas = document.createElement('canvas');
  nameCanvas.width = 256;
  nameCanvas.height = 48;
  const nctx = nameCanvas.getContext('2d');
  nctx.font = 'bold 18px Inter, sans-serif';
  nctx.textAlign = 'center';
  nctx.fillStyle = '#' + deptColor.toString(16).padStart(6, '0');
  nctx.fillText(name, 128, 30);
  const nameSprite = new THREE.Sprite(
    new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(nameCanvas), transparent: true, opacity: 0.8 })
  );
  nameSprite.position.y = sitting ? 1.0 : 1.2;
  nameSprite.scale.set(1.4, 0.25, 1);
  group.add(nameSprite);

  group.position.set(x, y, z);
  group.castShadow = true;
  scene.add(group);
  return { group, arms, legs, hands, shoes, ring, head, torso, sitting };
}

// Place agents on their floors with desks and chairs
DEPTS.forEach((dept, di) => {
  const baseZ = (di % 2 === 0) ? -2.5 : 2.5;
  const facingZ = baseZ > 0 ? -1 : 1;
  dept.ids.forEach((id, i) => {
    const maxPerRow = 4;
    const row = Math.floor(i / maxPerRow);
    const col = i % maxPerRow;
    const x = (col - Math.min(dept.ids.length - 1, maxPerRow - 1) / 2) * 2.5;
    const zOffset = baseZ + row * facingZ * 2.5;
    const floorY = (dept.floor - 1) * FH + 0.12;

    // Desk
    const desk = createLDesk(x, floorY + 0.5, zOffset + facingZ * 0.8, dept.color, facingZ);
    // Chair
    createErgonomicChair(x, floorY + 0.38, zOffset + facingZ * -0.2, dept.color);
    // Some desks get a succulent
    if ((i + di) % 3 === 0) {
      createSucculent(x + 0.6, floorY + 0.55, zOffset + facingZ * 0.8);
    }

    // Character (sitting at desk)
    const charY = floorY + 0.15;
    const char = createHumanCharacter(x, charY, zOffset, dept.color, id, true);

    meshes[id] = {
      char: char.group, arms: char.arms, legs: char.legs, hands: char.hands,
      shoes: char.shoes, ring: char.ring, head: char.head, torso: char.torso,
      sitting: true, desk, baseY: charY, color: dept.color,
      baseZ: zOffset, facingZ
    };
    states[id] = 'idle';
  });
});

const dataParticles = [];

function spawnFlow(fromId, toId) {
  const from = meshes[fromId];
  const to = meshes[toId];
  if (!from || !to) return;

  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const geo = new THREE.SphereGeometry(0.06, 8, 8);
      const mat = new THREE.MeshBasicMaterial({ color: 0x1D9E75, transparent: true });
      const orb = new THREE.Mesh(geo, mat);
      const start = from.char.position.clone().add(new THREE.Vector3(0, 0.8, 0));
      const end = to.char.position.clone().add(new THREE.Vector3(0, 0.8, 0));
      orb.position.copy(start);
      scene.add(orb);

      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      mid.y += 2 + Math.random() * 3;

      // Trail orbs (fading smaller orbs)
      const trail = [];
      for (let ti = 0; ti < 4; ti++) {
        const tGeo = new THREE.SphereGeometry(0.03 - ti * 0.005, 6, 6);
        const tMat = new THREE.MeshBasicMaterial({ color: 0x1D9E75, transparent: true, opacity: 0 });
        const tOrb = new THREE.Mesh(tGeo, tMat);
        scene.add(tOrb);
        trail.push({ mesh: tOrb, delay: (ti + 1) * 0.06 });
      }

      dataParticles.push({
        mesh: orb, start, mid, end,
        progress: 0, speed: 0.008 + Math.random() * 0.006,
        trail, positions: []
      });
    }, i * 80);
  }
}

    leadFountainParticles.push({
      mesh: p,
      velocity: new THREE.Vector3(
        (Math.random() - 0.5) * 0.05,
        0.1 + Math.random() * 0.15,
        (Math.random() - 0.5) * 0.05
      ),
      life: 1.0
    });
  }
}

// Pipeline: sequential green light wave flowing through floors
const pipelineWaves = [];
function spawnPipelineWave() {
  for (let fi = 0; fi < NF; fi++) {
    setTimeout(() => {
      const wave = new THREE.Mesh(
        new THREE.BoxGeometry(BW + 1, 0.1, BD + 1),
        new THREE.MeshBasicMaterial({ color: 0x1D9E75, transparent: true, opacity: 0.3 })
      );
      wave.position.y = fi * FH + 0.2;
      scene.add(wave);
      pipelineWaves.push({ mesh: wave, life: 1.0 });
    }, fi * 300);
  }
}

function fmt(n) { return (n || 0).toLocaleString('ko-KR'); }

function updateMetrics(m) {
  if (!m) return;
  document.getElementById('m-rev-today').textContent = '\u20A9' + fmt(m.revenue?.today);
  document.getElementById('m-rev-month').textContent = '\u20A9' + fmt(m.revenue?.month);
  document.getElementById('m-orders').textContent = fmt(m.orders?.total) + '\uAC74';
  document.getElementById('m-order-detail').textContent = fmt(m.orders?.confirmed) + ' / ' + fmt(m.orders?.pending);
  document.getElementById('m-orders-today').textContent = fmt(m.orders?.today) + '\uAC74';
  document.getElementById('m-leads').textContent = fmt(m.leads?.total) + '\uBA85';
  document.getElementById('m-leads-today').textContent = fmt(m.leads?.today) + '\uBA85';

  const goal = m.revenue?.goal || 5000000;
  const rev = m.revenue?.month || 0;
  const pct = Math.min(100, (rev / goal) * 100).toFixed(1);
  document.getElementById('goal-pct').textContent = pct + '%';
  document.getElementById('goal-fill').style.width = pct + '%';
}

function renderAgentList() {
  let html = '';
  DEPTS.forEach(d => {
    html += `<div class="dept-label"><span style="color:#${d.color.toString(16).padStart(6,'0')}">\u25CF</span> ${d.name} (${d.floor}F)</div>`;
    d.ids.forEach(id => {
      const st = states[id] || 'idle';
      html += `<div class="agent-row" data-id="${id}"><span class="status-dot ${st}"></span><span>${id}</span></div>`;
    });
  });
  document.getElementById('agent-list').innerHTML = html;

  document.querySelectorAll('.agent-row').forEach(row => {
    row.onclick = () => {
      const m = meshes[row.dataset.id];
      if (!m) return;
      controls.autoRotate = false;
      const target = m.char.position.clone().add(new THREE.Vector3(0, 0.5, 0));
      const camTarget = target.clone().add(new THREE.Vector3(4, 2.5, 4));
      animateCamera(camTarget, target, 2000);
      setTimeout(() => { controls.autoRotate = true; }, 10000);
    };
  });
}

function animateCamera(newPos, newTarget, duration) {
  duration = duration || 1500;
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const startTime = performance.now();

  function step(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    // easeInOutCubic
    const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

    camera.position.lerpVectors(startPos, newPos, ease);
    controls.target.lerpVectors(startTarget, newTarget, ease);
    controls.update();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function addFeed(text, cls = '') {
  const container = document.getElementById('feed');
  const div = document.createElement('div');
  div.className = 'feed-item ' + cls;
  div.innerHTML = `<span class="feed-time">${new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}</span> ${text}`;
  container.prepend(div);
  if (container.children.length > 30) container.lastChild.remove();
}

window.runP = name => {
  socket.emit('run-pipeline', name);
  addFeed(`\u{1F680} ${name} 파이프라인 시작`, 'pipe');
};

async function fetchStats() {
  try {
    const res = await fetch('/api/stats');
    if (res.ok) {
      const data = await res.json();
      updateMetrics(data);
    }
  } catch (e) { /* server may not be ready */ }
}

async function fetchChannels() {
  try {
    const res = await fetch('/api/channels');
    if (res.ok) {
      const data = await res.json();
      let html = '';
      if (data.youtube) {
        html += `<div class="channel-row"><span class="channel-icon">\u{1F4FA}</span><span class="channel-name">YouTube</span><span class="channel-val">${fmt(data.youtube.subscribers || 0)} 구독</span></div>`;
      }
      if (data.instagram) {
        html += `<div class="channel-row"><span class="channel-icon">\u{1F4F7}</span><span class="channel-name">Instagram</span><span class="channel-val">${fmt(data.instagram.followers || 0)} 팔로워</span></div>`;
      }
      if (data.facebook) {
        html += `<div class="channel-row"><span class="channel-icon">\u{1F4D8}</span><span class="channel-name">Facebook</span><span class="channel-val">${fmt(data.facebook.followers || 0)} 팔로워</span></div>`;
      }
      if (html) document.getElementById('channel-stats').innerHTML = html;
    }
  } catch (e) { /* ok */ }
}

fetchChannels();
setInterval(fetchStats, 30000);
setInterval(fetchChannels, 60000);

// ============================================================
// ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();
  controls.update();

  // Agent animations
  for (const [id, m] of Object.entries(meshes)) {
    const s = states[id];
    if (s === 'working') {
      // Sitting, working: slight torso lean, arms toward keyboard, head micro-nod
      m.torso.rotation.x = -0.08 + Math.sin(t * 2.5 + id.charCodeAt(0)) * 0.03;
      m.head.position.y = 0.72 + Math.sin(t * 3 + id.charCodeAt(1)) * 0.008;
      // Arms typing motion
      m.arms.forEach((arm, ai) => {
        arm.upper.rotation.x = -0.3 + Math.sin(t * 8 + ai * Math.PI + id.charCodeAt(0)) * 0.08;
        arm.fore.rotation.x = -0.8 + Math.sin(t * 10 + ai * Math.PI * 0.7 + id.charCodeAt(0)) * 0.06;
      });
      m.ring.material.opacity = 0.4 + Math.sin(t * 4) * 0.2;
    } else if (s === 'done') {
      // Walking animation (standing up effect): legs alternate, arms swing
      const walkPhase = t * 4 + id.charCodeAt(0);
      m.char.position.y = m.baseY + 0.15; // Stand up from chair
      // Legs alternating
      m.legs.forEach((leg, li) => {
        const phase = walkPhase + li * Math.PI;
        leg.upper.rotation.x = Math.sin(phase) * 0.3;
        leg.lower.rotation.x = Math.abs(Math.sin(phase)) * -0.2;
      });
      // Arms swinging opposite to legs
      m.arms.forEach((arm, ai) => {
        const phase = walkPhase + (ai + 1) * Math.PI;
        arm.upper.rotation.x = Math.sin(phase) * 0.2;
        arm.fore.rotation.x = -0.3;
      });
      // Slight horizontal movement
      m.char.position.x += Math.sin(walkPhase * 0.5) * 0.002;
      m.ring.material.opacity = 0.5;
    } else {
      // Idle: subtle breathing while sitting
      m.char.position.y = m.baseY;
      m.torso.scale.y = 1 + Math.sin(t * 1.5 + id.charCodeAt(0) * 0.5) * 0.008;
      m.head.position.y = 0.72;
      m.torso.rotation.x = 0;
      m.arms.forEach(arm => {
        arm.upper.rotation.x = -0.3;
        arm.fore.rotation.x = -0.8;
      });
      m.legs.forEach(leg => {
        leg.upper.rotation.x = -Math.PI / 2 + 0.2;
        leg.lower.rotation.x = -0.2;
      });
    }
  }

  // Data flow particles (curved paths with trails)
  for (let i = dataParticles.length - 1; i >= 0; i--) {
    const p = dataParticles[i];
    p.progress += p.speed;

    // Store positions for trail
    const t1 = p.progress;
    const t2 = 1 - t1;
    const pos = new THREE.Vector3(
      t2 * t2 * p.start.x + 2 * t2 * t1 * p.mid.x + t1 * t1 * p.end.x,
      t2 * t2 * p.start.y + 2 * t2 * t1 * p.mid.y + t1 * t1 * p.end.y,
      t2 * t2 * p.start.z + 2 * t2 * t1 * p.mid.z + t1 * t1 * p.end.z
    );
    p.positions.push(pos.clone());
    if (p.positions.length > 10) p.positions.shift();

    if (p.progress >= 1) {
      scene.remove(p.mesh);
      p.trail.forEach(tr => scene.remove(tr.mesh));
      dataParticles.splice(i, 1);
      continue;
    }

    p.mesh.position.copy(pos);
    p.mesh.material.opacity = Math.sin(p.progress * Math.PI);
    p.mesh.scale.setScalar(0.6 + Math.sin(p.progress * Math.PI) * 1.2);

    // Update trail
    p.trail.forEach((tr, ti) => {
      const idx = p.positions.length - 1 - (ti + 1) * 2;
      if (idx >= 0 && idx < p.positions.length) {
        tr.mesh.position.copy(p.positions[idx]);
        tr.mesh.material.opacity = Math.sin(p.progress * Math.PI) * (0.5 - ti * 0.1);
      }
    });
  }

  // Sale particles with gravity + sparkle
  for (let i = saleParticles.length - 1; i >= 0; i--) {
    const p = saleParticles[i];
    p.life -= 0.01;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      saleParticles.splice(i, 1);
      continue;
    }
    p.velocity.y -= 0.003;
    p.mesh.position.add(p.velocity);
    p.mesh.material.opacity = p.life * (0.7 + Math.sin(t * 15 + p.sparklePhase) * 0.3);
    p.mesh.scale.setScalar(p.life * 1.5);
  }

  // Lead ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.life -= 0.008;
    r.scale += 0.15;
    if (r.life <= 0) {
      scene.remove(r.mesh);
      ripples.splice(i, 1);
      continue;
    }
    r.mesh.scale.setScalar(r.scale);
    r.mesh.material.opacity = r.life * 0.6;
  }

  // Lead fountain particles
  for (let i = leadFountainParticles.length - 1; i >= 0; i--) {
    const p = leadFountainParticles[i];
    p.life -= 0.012;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      leadFountainParticles.splice(i, 1);
      continue;
    }
    p.velocity.y -= 0.002;
    p.mesh.position.add(p.velocity);
    p.mesh.material.opacity = p.life;
  }

  // Pipeline waves
  for (let i = pipelineWaves.length - 1; i >= 0; i--) {
    const w = pipelineWaves[i];
    w.life -= 0.015;
    if (w.life <= 0) {
      scene.remove(w.mesh);
      pipelineWaves.splice(i, 1);
      continue;
    }
    w.mesh.material.opacity = w.life * 0.3;
    w.mesh.scale.y = 1 + (1 - w.life) * 3;
  }

  // Antenna beacon blink (red)
  const blinkPhase = Math.sin(t * 2);
  antennaBeacon.material.opacity = blinkPhase > 0 ? 0.9 : 0.1;
  antennaLight.intensity = blinkPhase > 0 ? 3 : 0.2;

  // Server rack blinking lights
  serverRacks.forEach((sr, si) => {
    sr.lights.forEach((led, li) => {
      led.material.opacity = 0.3 + Math.sin(t * (3 + li * 0.7) + si * 2 + li) * 0.5;
    });
  });

  // Clouds drifting
  clouds.forEach(c => {
    c.mesh.position.x += c.speed * c.dir;
    if (c.mesh.position.x > 60) c.mesh.position.x = -60;
    if (c.mesh.position.x < -60) c.mesh.position.x = 60;
  });

  // Cars moving
  cars.forEach(car => {
    car.group.position.x += car.speed * (car.lane > 0 ? 1 : -1);
    if (car.group.position.x > 50) car.group.position.x = -50;
    if (car.group.position.x < -50) car.group.position.x = 50;
  });

  composer.render();
}
animate();
