<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lighthouse Media — Real-time HQ</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#050508;color:#e0e0e0;overflow:hidden}
    canvas{display:block;position:fixed;top:0;left:0}
    #header{position:fixed;top:0;left:0;right:0;padding:10px 20px;background:linear-gradient(180deg,rgba(5,5,8,0.98)70%,transparent);display:flex;align-items:center;justify-content:space-between;z-index:200}
    #header h1{font-size:16px;font-weight:700;color:#1D9E75;display:flex;align-items:center;gap:8px}
    .ld{width:8px;height:8px;background:#1D9E75;border-radius:50%;animation:p 1.5s infinite;box-shadow:0 0 12px #1D9E75}
    @keyframes p{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.4}}
    #lb{background:#e74c3c;color:#fff;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:700;letter-spacing:1px}
    #ck{font-size:11px;color:#444}
    #met{position:fixed;top:50px;right:12px;width:230px;background:rgba(8,8,14,0.94);border:1px solid rgba(29,158,117,0.2);border-radius:10px;padding:11px;z-index:150;backdrop-filter:blur(10px)}
    .mr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:10px}.mr:last-child{border:none}
    .ml{color:#555}.mv{color:#1D9E75;font-weight:700;font-size:12px}
    #ag{position:fixed;top:50px;left:12px;width:190px;max-height:calc(100vh-65px);overflow-y:auto;background:rgba(8,8,14,0.94);border:1px solid rgba(29,158,117,0.2);border-radius:10px;padding:10px;z-index:150;backdrop-filter:blur(10px)}
    .dt{font-size:8px;color:#1D9E75;text-transform:uppercase;letter-spacing:1px;margin-top:7px;font-weight:700}
    .ar{display:flex;align-items:center;gap:5px;padding:2px 4px;border-radius:3px;font-size:9px;cursor:pointer}.ar:hover{background:rgba(29,158,117,0.1)}
    .sd{width:5px;height:5px;border-radius:50%}.sd.idle{background:#222}.sd.working{background:#f1c40f;box-shadow:0 0 4px #f1c40f;animation:p .6s infinite}.sd.done{background:#1D9E75;box-shadow:0 0 3px #1D9E75}
    #pp{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(8,8,14,0.94);border:1px solid rgba(29,158,117,0.2);border-radius:10px;padding:9px 14px;display:flex;gap:7px;align-items:center;z-index:150}
    .pb{background:rgba(29,158,117,0.1);border:1px solid rgba(29,158,117,0.35);color:#1D9E75;padding:6px 11px;border-radius:6px;cursor:pointer;font-size:9px;font-weight:600;transition:all .2s}.pb:hover{background:#1D9E75;color:#fff}.pb.on{background:#f1c40f;border-color:#f1c40f;color:#000}
    #fd{position:fixed;bottom:55px;right:12px;width:230px;max-height:200px;overflow-y:auto;z-index:150}
    .fi{background:rgba(8,8,14,0.85);border-left:2px solid #1D9E75;padding:4px 7px;margin-bottom:2px;border-radius:3px;font-size:8px;animation:fa .3s}.fi.sale{border-color:#BA7517}.fi.pipe{border-color:#3498db}
    @keyframes fa{from{opacity:0;transform:translateX(8px)}}
    #rb{position:fixed;bottom:12px;right:12px;width:230px;background:rgba(8,8,14,0.94);border:1px solid rgba(186,117,23,0.2);border-radius:10px;padding:8px 11px;z-index:150}
    .pt{width:100%;height:4px;background:rgba(255,255,255,0.05);border-radius:2px;margin-top:4px}.pf{height:100%;background:linear-gradient(90deg,#1D9E75,#BA7517);border-radius:2px;transition:width .4s}
    ::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:#1D9E75;border-radius:1px}
  </style>
</head>
<body>
  <div id="header"><h1><span class="ld"></span>LIGHTHOUSE MEDIA</h1><div style="display:flex;align-items:center;gap:10px"><span id="lb">LIVE</span><span id="ck"></span></div></div>
  <div id="ag"></div>
  <div id="met">
    <div class="mr"><span class="ml">오늘 매출</span><span class="mv" id="v0">0원</span></div>
    <div class="mr"><span class="ml">총 매출</span><span class="mv" id="v1">0원</span></div>
    <div class="mr"><span class="ml">총 주문</span><span class="mv" id="v2">0건</span></div>
    <div class="mr"><span class="ml">입금대기</span><span class="mv" id="v3">0건</span></div>
    <div class="mr"><span class="ml">리드(이메일)</span><span class="mv" id="v4">0명</span></div>
    <div class="mr"><span class="ml">오늘 리드</span><span class="mv" id="v5">0명</span></div>
    <div style="border-top:1px solid rgba(29,158,117,0.15);margin-top:6px;padding-top:6px;">
      <a href="/admin.html" style="font-size:9px;color:#1D9E75;text-decoration:none;">관리자 페이지 →</a>
      <a href="/shop.html" style="font-size:9px;color:#BA7517;text-decoration:none;margin-left:8px;">판매 페이지 →</a>
    </div>
  </div>
  <div id="pp"><span style="font-size:9px;color:#333">RUN:</span>
    <button class="pb" onclick="runP('content')">콘텐츠</button>
    <button class="pb" onclick="runP('marketing')">마케팅</button>
    <button class="pb" onclick="runP('analysis')">분석</button>
    <button class="pb" onclick="runP('all')">전체 실행</button>
  </div>
  <div id="fd"></div>
  <div id="rb"><div style="display:flex;justify-content:space-between"><span style="font-size:8px;color:#555">월 목표 500만원</span><span style="font-size:10px;font-weight:700;color:#BA7517" id="rp">0%</span></div><div class="pt"><div class="pf" id="rf" style="width:0%"></div></div></div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
  <script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RectAreaLightUniformsLib } from 'three/addons/lights/RectAreaLightUniformsLib.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

RectAreaLightUniformsLib.init();

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);
scene.fog = new THREE.FogExp2(0x050508, 0.012);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 300);
camera.position.set(22, 16, 22);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

// Post-processing (bloom)
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.6, 0.4, 0.85);
composer.addPass(bloom);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.04;
controls.target.set(0, 5, 0);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;
controls.maxPolarAngle = Math.PI * 0.48;
controls.minDistance = 8;
controls.maxDistance = 50;

// === LIGHTING ===
scene.add(new THREE.AmbientLight(0x1a2030, 0.3));
const sun = new THREE.DirectionalLight(0xffeedd, 0.5);
sun.position.set(15, 30, 10); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 60;
sun.shadow.camera.left = -15; sun.shadow.camera.right = 15;
sun.shadow.camera.top = 15; sun.shadow.camera.bottom = -15;
scene.add(sun);

// Colored point lights per floor
const lights = [];
const lColors = [0x9b59b6, 0x3498db, 0x1D9E75, 0x1abc9c, 0xf1c40f];
lColors.forEach((c, i) => {
  const l = new THREE.PointLight(c, 1.5, 12);
  l.position.set(0, i * 2.8 + 1.5, 0);
  scene.add(l);
  lights.push(l);
});

// Accent spot
const spot = new THREE.SpotLight(0x1D9E75, 3, 40, 0.4, 0.5);
spot.position.set(0, 20, 0); spot.target.position.set(0, 0, 0);
scene.add(spot); scene.add(spot.target);

// === GROUND ===
const gndGeo = new THREE.PlaneGeometry(80, 80);
const gndMat = new THREE.MeshStandardMaterial({ color: 0x080810, roughness: 0.9, metalness: 0.1 });
const gnd = new THREE.Mesh(gndGeo, gndMat);
gnd.rotation.x = -Math.PI/2; gnd.receiveShadow = true; scene.add(gnd);

// Reflective ground disc
const disc = new THREE.Mesh(
  new THREE.CircleGeometry(14, 64),
  new THREE.MeshStandardMaterial({ color: 0x0a0a14, roughness: 0.2, metalness: 0.8 })
);
disc.rotation.x = -Math.PI/2; disc.position.y = 0.01; disc.receiveShadow = true; scene.add(disc);

// Grid (subtle)
const grid = new THREE.GridHelper(80, 80, 0x1D9E75, 0x0a0a12);
grid.material.transparent = true; grid.material.opacity = 0.08; scene.add(grid);

// === BUILDING ===
const FH = 2.8, NF = 5, BW = 13, BD = 10;

// Glass material
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0x88ccff, transparent: true, opacity: 0.12,
  roughness: 0.05, metalness: 0.1, side: THREE.DoubleSide,
  envMapIntensity: 1
});

// Steel frame material
const steelMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.3, metalness: 0.9 });

for (let i = 0; i < NF; i++) {
  const y = i * FH;

  // Floor slab - concrete look
  const slab = new THREE.Mesh(
    new THREE.BoxGeometry(BW, 0.18, BD),
    new THREE.MeshStandardMaterial({ color: 0x1a1a28, roughness: 0.8, metalness: 0.2 })
  );
  slab.position.y = y; slab.receiveShadow = true; slab.castShadow = true; scene.add(slab);

  // Floor edge glow strip
  const edgeGeo = new THREE.BoxGeometry(BW + 0.1, 0.04, BD + 0.1);
  const edgeMat = new THREE.MeshBasicMaterial({ color: 0x1D9E75, transparent: true, opacity: 0.25 });
  const edge = new THREE.Mesh(edgeGeo, edgeMat);
  edge.position.y = y + 0.1; scene.add(edge);

  // Glass walls - front & back
  const wallH = FH - 0.2;
  const frontWall = new THREE.Mesh(new THREE.PlaneGeometry(BW, wallH), glassMat);
  frontWall.position.set(0, y + wallH/2 + 0.1, BD/2); scene.add(frontWall);
  const backWall = frontWall.clone(); backWall.position.z = -BD/2; scene.add(backWall);
  const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(BD, wallH), glassMat);
  leftWall.position.set(-BW/2, y + wallH/2 + 0.1, 0); leftWall.rotation.y = Math.PI/2; scene.add(leftWall);
  const rightWall = leftWall.clone(); rightWall.position.x = BW/2; scene.add(rightWall);

  // Steel columns (4 corners + middle)
  const colPositions = [[-BW/2,-BD/2],[-BW/2,BD/2],[BW/2,-BD/2],[BW/2,BD/2],[0,-BD/2],[0,BD/2]];
  colPositions.forEach(([cx, cz]) => {
    const col = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, wallH, 8), steelMat);
    col.position.set(cx, y + wallH/2 + 0.1, cz); col.castShadow = true; scene.add(col);
  });

  // Horizontal beams
  const beamGeo = new THREE.BoxGeometry(BW, 0.06, 0.06);
  [-BD/2, BD/2].forEach(bz => {
    const beam = new THREE.Mesh(beamGeo, steelMat);
    beam.position.set(0, y + wallH + 0.1, bz); scene.add(beam);
  });

  // Interior floor - carpet/wood look per floor
  const floorColors = [0x1c1828, 0x181c28, 0x142820, 0x1a2828, 0x28241a];
  const interior = new THREE.Mesh(
    new THREE.PlaneGeometry(BW - 0.4, BD - 0.4),
    new THREE.MeshStandardMaterial({ color: floorColors[i], roughness: 0.9 })
  );
  interior.rotation.x = -Math.PI/2; interior.position.y = y + 0.1; scene.add(interior);

  // Ceiling lights (rect area lights)
  const rl = new THREE.RectAreaLight(lColors[i], 2, BW * 0.6, BD * 0.4);
  rl.position.set(0, y + FH - 0.2, 0); rl.rotation.x = Math.PI; scene.add(rl);
}

// === ROOF ===
const roof = new THREE.Mesh(
  new THREE.BoxGeometry(BW + 0.5, 0.25, BD + 0.5),
  new THREE.MeshStandardMaterial({ color: 0x1D9E75, roughness: 0.3, metalness: 0.7, emissive: 0x1D9E75, emissiveIntensity: 0.2 })
);
roof.position.y = NF * FH; roof.castShadow = true; scene.add(roof);

// Antenna/spire on roof
const spire = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.06, 3, 8), steelMat);
spire.position.y = NF * FH + 1.5; scene.add(spire);
const beacon = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), new THREE.MeshBasicMaterial({ color: 0x1D9E75 }));
beacon.position.y = NF * FH + 3; scene.add(beacon);

// === ENVIRONMENT - surrounding buildings (silhouettes) ===
for (let i = 0; i < 20; i++) {
  const bh = Math.random() * 8 + 3;
  const bw = Math.random() * 3 + 2;
  const bd = Math.random() * 3 + 2;
  const bx = (Math.random() - 0.5) * 60;
  const bz = (Math.random() - 0.5) * 60;
  if (Math.abs(bx) < 10 && Math.abs(bz) < 8) continue;
  const bg = new THREE.Mesh(
    new THREE.BoxGeometry(bw, bh, bd),
    new THREE.MeshStandardMaterial({ color: 0x0c0c16, roughness: 0.9 })
  );
  bg.position.set(bx, bh/2, bz); bg.castShadow = true; scene.add(bg);
  // Random window lights
  for (let w = 0; w < Math.floor(Math.random()*5)+2; w++) {
    const wl = new THREE.Mesh(
      new THREE.PlaneGeometry(0.3, 0.2),
      new THREE.MeshBasicMaterial({ color: 0xffeebb, transparent: true, opacity: Math.random()*0.3+0.1 })
    );
    wl.position.set(bx + (Math.random()-0.5)*bw*0.7, Math.random()*bh + 1, bz + bd/2 + 0.01);
    scene.add(wl);
  }
}

// === AGENTS (HIGH QUALITY CHARACTERS) ===
const DEPTS = [
  { name:'경영', floor:5, color:0xf1c40f, ids:['ceo-secretary','finance','operations'] },
  { name:'콘텐츠', floor:3, color:0x1D9E75, ids:['trend-researcher','content-director','scriptwriter','copywriter'] },
  { name:'제작', floor:2, color:0x3498db, ids:['video-editor','thumbnail','audio','designer','subtitle'] },
  { name:'마케팅', floor:2, color:0xBA7517, ids:['seo','marketing','ads','customer-journey'] },
  { name:'운영', floor:1, color:0x9b59b6, ids:['youtube-ops','instagram-ops','newsletter','payment'] },
  { name:'고객', floor:1, color:0xe74c3c, ids:['support','community','reviews'] },
  { name:'상품', floor:1, color:0xe67e22, ids:['product-planner','sales-copy'] },
  { name:'분석', floor:4, color:0x1abc9c, ids:['analytics','ab-testing','competitor'] },
  { name:'기술', floor:4, color:0x2ecc71, ids:['automation','security'] },
];

const meshes = {};
const states = {};
let zIdx = 0;

function createCharacter(x, y, z, color) {
  const group = new THREE.Group();

  // Body (torso)
  const torso = new THREE.Mesh(
    new THREE.CylinderGeometry(0.18, 0.22, 0.6, 12),
    new THREE.MeshStandardMaterial({ color: color, roughness: 0.6, metalness: 0.3 })
  );
  torso.position.y = 0.3;
  group.add(torso);

  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.16, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0xf5d0a9, roughness: 0.7 })
  );
  head.position.y = 0.76;
  group.add(head);

  // Hair
  const hair = new THREE.Mesh(
    new THREE.SphereGeometry(0.17, 16, 8, 0, Math.PI*2, 0, Math.PI*0.6),
    new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 })
  );
  hair.position.y = 0.8;
  group.add(hair);

  // Arms
  [-0.22, 0.22].forEach(side => {
    const arm = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.05, 0.35, 4, 8),
      new THREE.MeshStandardMaterial({ color: color, roughness: 0.6, metalness: 0.3 })
    );
    arm.position.set(side, 0.25, 0.05);
    arm.rotation.x = -0.3;
    group.add(arm);
  });

  // Legs
  [-0.08, 0.08].forEach(side => {
    const leg = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.055, 0.3, 4, 8),
      new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.8 })
    );
    leg.position.set(side, -0.15, 0);
    group.add(leg);
  });

  // Status ring (glowing ring around feet)
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.3, 0.02, 8, 32),
    new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.3 })
  );
  ring.rotation.x = Math.PI/2;
  ring.position.y = -0.3;
  group.add(ring);

  group.position.set(x, y, z);
  group.castShadow = true;
  scene.add(group);
  return group;
}

function createDesk(x, y, z, color, facingZ) {
  const group = new THREE.Group();

  // Desk surface (dark wood)
  const top = new THREE.Mesh(
    new THREE.BoxGeometry(1.3, 0.05, 0.7),
    new THREE.MeshStandardMaterial({ color: 0x2a2235, roughness: 0.5, metalness: 0.3 })
  );
  top.position.y = 0; group.add(top);

  // Desk legs
  [[-0.55,-0.28],[0.55,-0.28],[-0.55,0.28],[0.55,0.28]].forEach(([lx,lz]) => {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5, 6), steelMat);
    leg.position.set(lx, -0.25, lz); group.add(leg);
  });

  // Monitor
  const monitorStand = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.03, 0.2, 8), steelMat);
  monitorStand.position.set(0, 0.12, facingZ * 0.15); group.add(monitorStand);

  const screen = new THREE.Mesh(
    new THREE.BoxGeometry(0.55, 0.35, 0.02),
    new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.1, metalness: 0.5 })
  );
  screen.position.set(0, 0.32, facingZ * 0.15); group.add(screen);

  // Screen glow
  const glow = new THREE.Mesh(
    new THREE.PlaneGeometry(0.5, 0.3),
    new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.5 })
  );
  glow.position.set(0, 0.32, facingZ * 0.15 - facingZ * 0.015); group.add(glow);

  // Keyboard
  const kb = new THREE.Mesh(
    new THREE.BoxGeometry(0.35, 0.015, 0.12),
    new THREE.MeshStandardMaterial({ color: 0x1a1a2a, roughness: 0.6 })
  );
  kb.position.set(0, 0.03, -facingZ * 0.1); group.add(kb);

  // Coffee mug
  const mug = new THREE.Mesh(
    new THREE.CylinderGeometry(0.03, 0.025, 0.06, 8),
    new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.4 })
  );
  mug.position.set(0.45, 0.06, 0); group.add(mug);

  group.position.set(x, y, z);
  scene.add(group);
  return { group, screen: glow };
}

// Place all agents
DEPTS.forEach((dept, di) => {
  const zOff = (di % 2 === 0) ? -2.5 : 2.8;
  const facingZ = zOff > 0 ? -1 : 1;
  dept.ids.forEach((id, i) => {
    const x = (i - (dept.ids.length-1)/2) * 2.5;
    const y = (dept.floor-1) * FH + 0.28;
    const z = zOff;

    const character = createCharacter(x, y + 0.5, z, dept.color);
    const desk = createDesk(x, y, z + facingZ * 0.8, dept.color, facingZ);

    meshes[id] = { char: character, desk: desk, baseY: y + 0.5, color: dept.color, screen: desk.screen };
    states[id] = 'idle';
  });
});

// === PARTICLES ===
const particles = [];
function spawnFlow(from, to) {
  if (!meshes[from] || !meshes[to]) return;
  const count = 5;
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const geo = new THREE.SphereGeometry(0.06, 8, 8);
      const mat = new THREE.MeshBasicMaterial({ color: 0x1D9E75, transparent: true });
      const m = new THREE.Mesh(geo, mat);
      m.position.copy(meshes[from].char.position);
      scene.add(m);
      particles.push({ mesh: m, from: meshes[from].char.position.clone(), to: meshes[to].char.position.clone(), p: 0, speed: 0.012 + Math.random()*0.008 });
    }, i * 80);
  }
}

// === SOCKET ===
const socket = io();
socket.on('init', d => updateUI(d.metrics));
socket.on('agent-update', ({ id, status }) => {
  states[id] = status;
  const m = meshes[id];
  if (!m) return;
  if (status === 'working') { m.screen.material.opacity = 1; m.screen.material.color.setHex(0xffff88); }
  else if (status === 'done') { m.screen.material.opacity = 0.7; m.screen.material.color.setHex(m.color); }
  else { m.screen.material.opacity = 0.4; m.screen.material.color.setHex(m.color); }
  renderList();
});
socket.on('data-flow', ({ from, to }) => spawnFlow(from, to));
socket.on('sale', ({ amount, product, name }) => { addF(`💰 ${name||'고객'}님 ${product} +${(amount||0).toLocaleString()}원`,'sale'); spot.intensity = 8; setTimeout(()=>spot.intensity=3, 500); });
socket.on('new-lead', ({ name, email }) => { addF(`📧 새 구독: ${name||email}`,'pipe'); });
socket.on('metrics-update', updateUI);
socket.on('pipeline-progress', ({ name, step, total, current }) => addF(`⚡ ${name} [${step}/${total}] ${current}`,'pipe'));

function updateUI(m) {
  document.getElementById('v0').textContent = (m.revenue?.today||0).toLocaleString()+'원';
  document.getElementById('v1').textContent = (m.revenue?.month||0).toLocaleString()+'원';
  document.getElementById('v2').textContent = (m.orders?.total||0)+'건';
  document.getElementById('v3').textContent = (m.orders?.pending||0)+'건';
  document.getElementById('v4').textContent = (m.leads?.total||0)+'명';
  document.getElementById('v5').textContent = (m.leads?.today||0)+'명';
  const goal = m.revenue?.goal||5000000;
  const rev = m.revenue?.month||0;
  const p = Math.min(100, rev/goal*100).toFixed(1);
  document.getElementById('rp').textContent = p+'%';
  document.getElementById('rf').style.width = p+'%';
}

function renderList() {
  let h = '';
  DEPTS.forEach(d => { h += `<div class="dt">${d.name} (${d.floor}F)</div>`; d.ids.forEach(id => { h += `<div class="ar" data-id="${id}"><span class="sd ${states[id]||'idle'}"></span>${id}</div>`; }); });
  document.getElementById('ag').innerHTML = h;
  document.querySelectorAll('.ar').forEach(r => r.onclick = () => { const m = meshes[r.dataset.id]; if(m){controls.target.copy(m.char.position);camera.position.set(m.char.position.x+3,m.char.position.y+2,m.char.position.z+3);} });
}
renderList();

function addF(t, c='') {
  const f = document.getElementById('fd'), d = document.createElement('div');
  d.className = 'fi '+c;
  d.innerHTML = `<span style="color:#333">${new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span> ${t}`;
  f.prepend(d); if(f.children.length>30) f.lastChild.remove();
}

window.runP = n => { socket.emit('run-pipeline', n); addF(`🚀 ${n} 파이프라인 시작`,'pipe'); };

// === ANIMATION ===
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.update();

  // Agent animations
  for (const [id, m] of Object.entries(meshes)) {
    const s = states[id];
    if (s === 'working') {
      // Typing motion - subtle bob
      m.char.position.y = m.baseY + Math.sin(t * 6 + id.charCodeAt(0)) * 0.02;
      // Arms typing motion
      const arms = m.char.children.filter((c, i) => i === 4 || i === 5);
      arms.forEach((arm, ai) => { arm.rotation.x = -0.3 + Math.sin(t * 8 + ai * Math.PI) * 0.1; });
    } else {
      m.char.position.y = m.baseY;
    }
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.p += p.speed;
    if (p.p >= 1) { scene.remove(p.mesh); particles.splice(i,1); continue; }
    const pos = new THREE.Vector3().lerpVectors(p.from, p.to, p.p);
    pos.y += Math.sin(p.p * Math.PI) * 2;
    p.mesh.position.copy(pos);
    p.mesh.material.opacity = Math.sin(p.p * Math.PI);
    p.mesh.scale.setScalar(0.5 + Math.sin(p.p * Math.PI) * 1.5);
  }

  // Beacon pulse
  beacon.material.opacity = 0.5 + Math.sin(t * 2) * 0.5;
  beacon.scale.setScalar(1 + Math.sin(t * 2) * 0.2);

  // Subtle light movement
  lights.forEach((l, i) => { l.intensity = 1.5 + Math.sin(t * 0.5 + i) * 0.3; });

  composer.render();
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
setInterval(() => { document.getElementById('ck').textContent = new Date().toLocaleString('ko-KR'); }, 1000);
  </script>
</body>
